<!DOCTYPE html>
<html>
<head>

<title>CCA Hitlistn</title>

<style>

body{
    font-family:Arial;
    background:#111;
    color:white;
    margin:40px;
}

h1{
    text-align:center;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:#222;
    padding:15px;
    border-radius:10px;
    text-align:center;
}

.card img{
    width:100%;
    border-radius:8px;
}

.card h3{
    margin-top:10px;
}

</style>

</head>

<body>

<h1>My Collection</h1>

<div class="grid">

<div class="card">
    <img src="images/emmitt-manga.png" alt="Emmitt Smith Manga">
    <h3>Emmitt Smith Manga</h3>
</div>

<div class="card">
    <img src="images/bo-manga.png" alt="Bo Jackson Manga">
    <h3>Bo Jackson Manga</h3>
</div>

<div class="card">
<img src="https://picsum.photos/300?3">
<h3>Tom Brady Rookie</h3>
</div>

<div class="card">
<img src="https://picsum.photos/300?4">
<h3>Shohei Ohtani Rookie</h3>
</div>

</div>

</body>
</html>
